name: Publish fgmetric to PyPI

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

# Ensure only one publish workflow runs at a time
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  UV_VERSION: 0.9.26
  PYTHON_VERSION: 3.12

jobs:
  tests:
    name: Static Analysis Checks
    uses: "./.github/workflows/python_package.yml"

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "${{ env.UV_VERSION }}"
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: 'true'
          cache-suffix: ${{ env.PYTHON_VERSION }}

      - name: Build sdist and wheel
        run: |
          uv build --sdist --wheel

      - name: List built artifacts
        run: |
          ls -la dist/

      - name: Verify package metadata
        run: |
          uv run --with twine twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 30

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build]

    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{ github.event.repository.name }}

    # Required for PyPI Trusted Publishing
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: List artifacts to publish
        run: |
          echo "Publishing the following artifacts to TestPyPI:"
          ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [publish-testpypi]

    environment:
      name: pypi  # Requires manual approval if configured
      url: https://pypi.org/p/${{ github.event.repository.name }}

    # Required for PyPI Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: List artifacts to publish
        run: |
          echo "Publishing the following artifacts to PyPI:"
          ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          print-hash: true
          verbose: true

  make-changelog:
    name: Draft Changelog
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    outputs:
      release_body: "${{ steps.git-cliff.outputs.content }}"
    steps:
      - name: Checkout the Repository at the Tagged Commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          ref: "${{ github.ref_name }}"

      - name: Generate a Changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.8.0
        id: git-cliff
        with:
          config: pyproject.toml
          args: --latest --verbose
        env:
          GITHUB_REPO: "${{ github.repository }}"

  make-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    environment: github
    permissions:
      contents: write
    needs: make-changelog
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          name: '${{ github.ref_name }}'
          body: '${{ needs.make-changelog.outputs.release_body }}'
          draft: false
          prerelease: false
          files: "dist/*"
